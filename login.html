<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Diamond Login</title>
    <meta name="description" content="South Diamond admin login." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-body">
    <main class="login-main">
      <section class="login-card">
        <a class="brand" href="index.html" aria-label="South Diamond home">
          <span class="brand-mark"></span>
          <span>South Diamond</span>
        </a>
        <div>
          <p class="section-kicker">Admin login</p>
          <h1>Operator access</h1>
          <p>Sign in to reply to South Diamond player messages.</p>
        </div>
        <form class="login-form" data-login-form>
          <label for="login-username">Username</label>
          <input id="login-username" data-login-username type="text" autocomplete="username" required />
          <label for="login-password">Password</label>
          <input id="login-password" data-login-password type="password" autocomplete="current-password" required />
          <button class="button primary" type="submit">Log In</button>
          <p class="login-error" data-login-error role="alert"></p>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
