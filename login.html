<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Diamond Login</title>
    <meta name="description" content="South Diamond admin login." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-body">
    <main class="login-main">
      <section class="login-card">
        <a class="brand" href="/login9493" aria-label="South Diamond admin login">
          <span class="brand-mark"></span>
          <span>South Diamond</span>
        </a>
        <div>
          <p class="section-kicker">Admin login</p>
          <h1>Operator access</h1>
          <p>Sign in to reply to South Diamond player messages.</p>
        </div>
        <form class="login-form" data-login-form>
          <label for="login-username">Username</label>
          <input id="login-username" data-login-username type="text" autocomplete="username" required />
          <label for="login-password">Password</label>
          <input id="login-password" data-login-password type="password" autocomplete="current-password" required />
          <div class="admin-code-panel is-hidden" data-admin-code-panel>
            <label for="login-code">Email security code</label>
            <input id="login-code" data-login-code type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="Enter 6-digit code" />
            <small>Check your admin email for the login code. (Sub-admins log in directly without a code.)</small>
          </div>
          <button class="button primary" type="submit" data-login-submit>Log In</button>
          <p class="login-error" data-login-error role="alert"></p>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
