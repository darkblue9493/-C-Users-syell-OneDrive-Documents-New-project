<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Diamond Admin</title>
    <meta name="description" content="South Diamond operator chat desk." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-body">
    <header class="site-header is-scrolled">
      <a class="brand" href="admin.html" aria-label="South Diamond admin home">
        <span class="brand-mark"></span>
        <span>South Diamond Admin</span>
      </a>
      <nav class="site-nav">
        <button class="logout-button" type="button" data-logout>Log Out</button>
      </nav>
    </header>

    <main class="admin-main">
      <section class="section">
        <div class="section-inner admin-layout">
          <div>
            <p class="section-kicker">Operator desk</p>
            <h1>Reply to player messages.</h1>
            <p class="admin-copy">
              New player messages appear here. Choose a conversation, type your reply, and the answer shows back in that player's chat.
            </p>
            <button class="button secondary admin-clear" type="button" data-clear-chats>Clear Demo Chats</button>
          </div>

          <div class="admin-workspace">
            <section class="registered-panel" aria-label="Registered players">
              <div class="chat-topbar">
                <div>
                  <span class="status-dot"></span>
                  <strong>Registered Players</strong>
                </div>
                <small data-admin-user-count>0 players</small>
              </div>
              <div class="registered-list" data-admin-users></div>
            </section>

            <div class="chat-dashboard admin-dashboard" aria-label="South Diamond admin inbox">
              <aside class="chat-inbox" aria-label="Player conversations" data-admin-inbox></aside>
              <div class="chat-window" aria-label="Selected player conversation">
                <div class="chat-topbar">
                  <div>
                    <span class="status-dot"></span>
                    <strong data-admin-name>No player selected</strong>
                  </div>
                  <small data-admin-count>0 chats</small>
                </div>
                <div class="chat-messages" data-admin-messages aria-live="polite"></div>
                <form class="chat-form" data-admin-form>
                  <label class="sr-only" for="admin-reply">Reply</label>
                  <input id="admin-reply" data-admin-input type="text" placeholder="Type your reply..." autocomplete="off" />
                  <button class="button primary" type="submit">Reply</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
