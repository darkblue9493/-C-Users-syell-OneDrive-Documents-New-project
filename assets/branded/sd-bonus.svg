<?xml version="1.0" encoding="UTF-8"?>
<!--
  South Diamond branded BONUS/SCATTER symbol.
  Visually distinct from WILD (star/burst silhouette in violet/pink instead of
  diamond/gold) so they're easy to tell apart on the reels.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="South Diamond Bonus">
  <defs>
    <radialGradient id="sd-bonus-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2a1235"/>
      <stop offset="55%" stop-color="#120726"/>
      <stop offset="100%" stop-color="#04010d"/>
    </radialGradient>
    <radialGradient id="sd-bonus-burst" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#fff7e8"/>
      <stop offset="35%" stop-color="#ffb84d"/>
      <stop offset="70%" stop-color="#d63384"/>
      <stop offset="100%" stop-color="#5a0e3a"/>
    </radialGradient>
    <linearGradient id="sd-bonus-text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0c8"/>
      <stop offset="100%" stop-color="#ffb84d"/>
    </linearGradient>
    <filter id="sd-bonus-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sd-bonus-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background plate -->
  <rect x="6" y="6" width="244" height="244" rx="22" ry="22"
        fill="url(#sd-bonus-bg)" stroke="#d63384" stroke-width="3"/>
  <rect x="14" y="14" width="228" height="228" rx="16" ry="16" fill="none"
        stroke="#5a0e3a" stroke-width="1" opacity="0.85"/>

  <!-- Outer rays (long thin spikes) -->
  <g fill="#ffb84d" opacity="0.55" filter="url(#sd-bonus-glow)">
    <polygon points="128,18 132,90 124,90"/>
    <polygon points="128,238 132,166 124,166"/>
    <polygon points="18,128 90,124 90,132"/>
    <polygon points="238,128 166,124 166,132"/>
    <polygon points="48,48 96,90 90,96"/>
    <polygon points="208,48 166,90 172,96"/>
    <polygon points="48,208 96,166 90,160"/>
    <polygon points="208,208 166,166 172,160"/>
  </g>

  <!-- Central burst (10-pointed star) -->
  <g filter="url(#sd-bonus-shadow)">
    <polygon
      fill="url(#sd-bonus-burst)"
      stroke="#fff7e8" stroke-width="1.5"
      points="128,52
              140,100
              188,90
              156,124
              196,150
              148,148
              152,196
              128,162
              104,196
              108,148
              60,150
              100,124
              68,90
              116,100"/>
  </g>

  <!-- BONUS text band -->
  <g filter="url(#sd-bonus-glow)">
    <rect x="40" y="116" width="176" height="30" rx="5" ry="5"
          fill="#0a0418" stroke="#ffb84d" stroke-width="1.5" opacity="0.92"/>
    <text x="128" y="138" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="22" font-weight="900"
          fill="url(#sd-bonus-text)" letter-spacing="5">BONUS</text>
  </g>

  <!-- Brand line -->
  <text x="128" y="34" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11" font-weight="700" letter-spacing="4"
        fill="#ffb84d" opacity="0.9">SOUTH DIAMOND</text>
</svg>
