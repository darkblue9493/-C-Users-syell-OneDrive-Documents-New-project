<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>South Diamond</title>
    <meta name="description" content="South Diamond player login, daily spin, games, and support chat." />
    <meta name="theme-color" content="#08020d" />
    <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml" />
    <style>
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body {
        font-family: Arial, Helvetica, sans-serif;
        color: #fff;
        background:
          linear-gradient(180deg, rgba(5, 0, 8, .45), rgba(5, 0, 8, .9)),
          url("assets/slots/south-diamond-lobby-bg-phone.webp?v=20260525-lobby-bg") center top / cover fixed,
          #08020d;
      }
      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: max(18px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
      }
      .home-card {
        width: min(460px, 100%);
        padding: 20px;
        border: 1px solid rgba(255, 215, 107, .38);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(10, 2, 16, .96), rgba(22, 5, 34, .94));
        box-shadow: 0 22px 70px rgba(0, 0, 0, .58), 0 0 32px rgba(255, 215, 107, .14);
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 16px;
        color: #ffd76b;
        font-family: Georgia, serif;
        font-size: 1.55rem;
        font-weight: 900;
        text-decoration: none;
        text-shadow: 0 0 14px rgba(255, 215, 107, .45);
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border: 2px solid #fff;
        border-radius: 9px;
        background: linear-gradient(135deg, #ffd76b, #d4002a);
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: .78rem;
        box-shadow: 0 0 16px rgba(255, 215, 107, .72);
      }
      h1 {
        margin: 0 0 8px;
        text-align: center;
        font-size: clamp(1.8rem, 7vw, 2.7rem);
        line-height: 1;
      }
      .intro {
        margin: 0 0 18px;
        text-align: center;
        color: rgba(255, 255, 255, .74);
        line-height: 1.45;
      }
      .hidden { display: none !important; }
      .login-form {
        display: grid;
        gap: 10px;
      }
      label {
        color: rgba(255, 255, 255, .72);
        font-size: .82rem;
        font-weight: 800;
      }
      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid rgba(255, 215, 107, .32);
        border-radius: 12px;
        background: rgba(0, 0, 0, .56);
        color: #fff;
        padding: 10px 12px;
        font: inherit;
        font-size: 16px;
      }
      button, .home-link {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, .35);
        font: inherit;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
      }
      .primary {
        background: linear-gradient(180deg, #ffd76b, #b8830a);
        color: #1a0d06;
        box-shadow: 0 0 18px rgba(255, 215, 107, .32);
      }
      .secondary {
        background: rgba(255, 255, 255, .08);
        color: #fff;
      }
      .danger {
        background: linear-gradient(180deg, #ff6b6b, #b4232c);
        color: #fff;
      }
      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 8px;
      }
      .player-home {
        display: grid;
        gap: 14px;
      }
      .home-toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .player-top {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 12px;
        border: 1px solid rgba(123, 232, 255, .28);
        border-radius: 14px;
        background: rgba(0, 0, 0, .34);
      }
      .player-top span {
        display: block;
        color: #7be8ff;
        font-size: .78rem;
        font-weight: 900;
      }
      .player-top strong {
        display: block;
        margin-top: 2px;
        font-size: 1.1rem;
      }
      .balance {
        text-align: right;
        color: #52ef9f;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .menu-panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(123, 232, 255, .28);
        border-radius: 16px;
        background: rgba(0, 0, 0, .34);
      }
      .menu-profile {
        display: grid;
        gap: 2px;
      }
      .menu-profile span,
      .password-form span {
        color: rgba(255, 255, 255, .66);
        font-size: .78rem;
        font-weight: 900;
      }
      .menu-profile strong {
        color: #7be8ff;
        font-size: 1.08rem;
      }
      .password-form {
        display: grid;
        gap: 8px;
      }
      .spin-card {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(255, 215, 107, .28);
        border-radius: 16px;
        background: rgba(255, 215, 107, .08);
      }
      .spin-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .spin-top strong {
        color: #ffd76b;
        font-size: 1.1rem;
      }
      .spin-result {
        min-height: 46px;
        display: grid;
        place-items: center;
        padding: 10px;
        border-radius: 12px;
        background: rgba(0, 0, 0, .36);
        color: rgba(255, 255, 255, .9);
        text-align: center;
        line-height: 1.35;
      }
      .spin-result.win {
        color: #52ef9f;
        border: 1px solid rgba(82, 239, 159, .4);
      }
      .wheel {
        width: 96px;
        height: 96px;
        margin: 0 auto;
        border-radius: 50%;
        border: 6px solid #ffd76b;
        background: conic-gradient(#d4002a 0 60deg, #1a0828 60deg 120deg, #0b8f4a 120deg 180deg, #5a0017 180deg 240deg, #b8830a 240deg 300deg, #08020d 300deg 360deg);
        transition: transform 2s cubic-bezier(.16, .9, .18, 1);
      }
      .status {
        min-height: 20px;
        margin: 12px 0 0;
        color: #ffd76b;
        text-align: center;
        font-size: .86rem;
      }
      .chat-panel {
        position: fixed;
        left: 50%;
        bottom: max(14px, env(safe-area-inset-bottom));
        z-index: 10;
        width: min(420px, calc(100vw - 24px));
        max-height: min(620px, calc(100vh - 28px));
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        transform: translateX(-50%);
        border: 1px solid rgba(123, 232, 255, .38);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(7, 2, 12, .98), rgba(17, 4, 28, .98));
        box-shadow: 0 18px 54px rgba(0, 0, 0, .55);
        overflow: hidden;
      }
      .chat-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 11px 12px;
        background: rgba(123, 232, 255, .1);
      }
      .chat-head strong { color: #7be8ff; }
      .chat-name,
      .chat-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid rgba(255, 255, 255, .08);
      }
      .chat-name small {
        grid-column: 1 / -1;
        min-height: 16px;
        color: #ffd76b;
      }
      .messages {
        min-height: 160px;
        max-height: 300px;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 8px;
        padding: 10px;
      }
      .message {
        max-width: 86%;
        padding: 9px 10px;
        border-radius: 12px;
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.08);
      }
      .message.player {
        justify-self: end;
        background: rgba(82, 239, 159, .14);
        border-color: rgba(82, 239, 159, .26);
      }
      .message span {
        display: block;
        margin-bottom: 3px;
        color: #ffd76b;
        font-size: .68rem;
        font-weight: 900;
      }
      .message p {
        margin: 0;
        line-height: 1.35;
      }
      @media (max-width: 390px) {
        .home-card { padding: 18px; }
        .button-row,
        .home-toolbar,
        .actions,
        .chat-name,
        .chat-form { grid-template-columns: 1fr; }
        .player-top { grid-template-columns: 1fr; }
        .balance { text-align: left; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="home-card" aria-label="South Diamond player home">
        <a class="brand" href="/" aria-label="South Diamond" data-home-brand>
          <span class="brand-mark">SD</span>
          <span>South Diamond</span>
        </a>

        <div data-login-view>
          <h1>Player Login</h1>
          <p class="intro">Log in to enter the South Diamond games. Need help? Start chat before you sign in.</p>
          <form class="login-form" data-player-login>
            <label for="player-email">Username or email</label>
            <input id="player-email" name="email" type="text" autocomplete="username" required />
            <label for="player-password">Password</label>
            <input id="player-password" name="password" type="password" autocomplete="current-password" required />
            <div class="button-row">
              <button class="primary" type="submit">Log In</button>
              <button class="secondary" type="button" data-chat-open>Chat</button>
            </div>
          </form>
        </div>

        <div class="player-home hidden" data-player-home>
          <h1>South Diamond</h1>
          <div class="home-toolbar">
            <button class="secondary" type="button" data-menu-toggle>Menu</button>
            <button class="secondary" type="button" data-chat-open>Chat</button>
          </div>
          <section class="menu-panel hidden" data-player-menu>
            <div class="menu-profile">
              <span>Profile</span>
              <strong data-menu-player-name>Player</strong>
            </div>
            <form class="password-form" data-password-form>
              <span>Change Password</span>
              <input name="currentPassword" type="password" autocomplete="current-password" placeholder="Current password" required />
              <input name="newPassword" type="password" autocomplete="new-password" placeholder="New password" minlength="6" required />
              <button class="primary" type="submit">Update Password</button>
            </form>
            <button class="danger" type="button" data-logout>Sign Out</button>
          </section>
          <div class="player-top">
            <div>
              <span>Player</span>
              <strong data-player-name>Player</strong>
            </div>
            <div class="balance">
              <span>Points</span>
              <strong data-player-points>0.00</strong>
            </div>
          </div>
          <div class="actions">
            <a class="home-link primary" href="/slots-arcade.html">Enter Games</a>
            <button class="secondary" type="button" data-spin-run>Daily Spin</button>
          </div>
          <section class="spin-card" aria-label="Daily spin">
            <div class="spin-top">
              <strong>Daily Spin</strong>
              <span data-spin-state>Checking...</span>
            </div>
            <div class="wheel" data-spin-wheel aria-hidden="true"></div>
            <p class="spin-result" data-spin-result>Checking daily spin...</p>
          </section>
        </div>

        <p class="status" data-status role="alert"></p>
      </section>
    </main>

    <section class="chat-panel hidden" data-chat-panel aria-label="South Diamond support chat">
      <div class="chat-head">
        <strong>Support Chat</strong>
        <button class="secondary" type="button" data-chat-close>Close</button>
      </div>
      <form class="chat-name" data-chat-name-form>
        <input name="name" type="text" autocomplete="name" maxlength="60" placeholder="Enter your name" />
        <button class="primary" type="submit">Start Chat</button>
        <small data-chat-name-status></small>
      </form>
      <div class="messages" data-messages></div>
      <form class="chat-form" data-chat-form>
        <input name="message" type="text" autocomplete="off" placeholder="Message support..." disabled />
        <button class="primary" type="submit">Send</button>
      </form>
    </section>

    <script>
      (() => {
        const status = document.querySelector("[data-status]");
        const loginView = document.querySelector("[data-login-view]");
        const playerHome = document.querySelector("[data-player-home]");
        const playerName = document.querySelector("[data-player-name]");
        const menuPlayerName = document.querySelector("[data-menu-player-name]");
        const playerPoints = document.querySelector("[data-player-points]");
        const playerMenu = document.querySelector("[data-player-menu]");
        const passwordForm = document.querySelector("[data-password-form]");
        const spinState = document.querySelector("[data-spin-state]");
        const spinResult = document.querySelector("[data-spin-result]");
        const spinWheel = document.querySelector("[data-spin-wheel]");
        const spinRunButtons = document.querySelectorAll("[data-spin-run]");
        const chatPanel = document.querySelector("[data-chat-panel]");
        const nameForm = document.querySelector("[data-chat-name-form]");
        const nameStatus = document.querySelector("[data-chat-name-status]");
        const chatForm = document.querySelector("[data-chat-form]");
        const messages = document.querySelector("[data-messages]");
        const storageKey = "sd_player_login_guest_name";
        let currentPlayer = null;
        let guestName = "";

        async function api(path, options = {}) {
          const response = await fetch(path, {
            cache: "no-store",
            credentials: "same-origin",
            headers: options.body ? { "Content-Type": "application/json" } : undefined,
            ...options,
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const error = new Error(data.error || "South Diamond request failed.");
            Object.assign(error, data);
            throw error;
          }
          return data;
        }

        function fmt(n) {
          return Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function setStatus(message, good = false) {
          status.textContent = message || "";
          status.style.color = good ? "#52ef9f" : "#ffd76b";
        }

        function showLogin() {
          currentPlayer = null;
          loginView.classList.remove("hidden");
          playerHome.classList.add("hidden");
          setStatus("");
        }

        function showHome(user) {
          currentPlayer = user;
          loginView.classList.add("hidden");
          playerHome.classList.remove("hidden");
          playerName.textContent = user?.username || "Player";
          menuPlayerName.textContent = user?.username || "Player";
          playerPoints.textContent = fmt(user?.points);
          setStatus("");
          refreshSpinStatus().catch((error) => {
            spinResult.textContent = error.message || "Could not load daily spin.";
          });
        }

        function savedName() {
          if (currentPlayer) return currentPlayer.username || "Player";
          if (guestName) return guestName;
          try { guestName = localStorage.getItem(storageKey) || ""; } catch (error) {}
          return guestName.trim().slice(0, 60);
        }

        function setName(name) {
          guestName = String(name || "").trim().slice(0, 60);
          try { if (guestName) localStorage.setItem(storageKey, guestName); } catch (error) {}
        }

        function renderMessages(items = []) {
          messages.innerHTML = "";
          const shown = items.length ? items : [{ author: "operator", text: savedName() ? "Send your message to South Diamond support." : "Enter your name to start chat." }];
          shown.forEach((item) => {
            const el = document.createElement("article");
            el.className = `message ${item.author === "operator" ? "operator" : "player"}`;
            const who = document.createElement("span");
            who.textContent = item.author === "operator" ? "Support" : "You";
            const text = document.createElement("p");
            text.textContent = item.text || "";
            el.append(who, text);
            messages.appendChild(el);
          });
          messages.scrollTop = messages.scrollHeight;
        }

        function updateChatState() {
          const needsGuestName = !currentPlayer && !savedName();
          nameForm.classList.toggle("hidden", !needsGuestName);
          chatForm.elements.message.disabled = needsGuestName;
          if (needsGuestName) nameForm.elements.namedItem("name")?.focus();
        }

        async function refreshChat() {
          const endpoint = currentPlayer ? "/api/player/chat" : "/api/chats/guest-message";
          const data = await api(endpoint);
          renderMessages(data.chat?.messages || []);
        }

        function openChat() {
          chatPanel.classList.remove("hidden");
          updateChatState();
          refreshChat().catch(() => renderMessages([]));
        }

        function spinWait(value) {
          if (!value) return "Daily spin is not ready yet.";
          const date = new Date(value);
          if (Number.isNaN(date.getTime())) return "Daily spin is not ready yet.";
          return `Next spin opens ${date.toLocaleString()}.`;
        }

        async function refreshSpinStatus({ updateResult = true } = {}) {
          if (!currentPlayer) return;
          const data = await api("/api/player/spin-status");
          spinState.textContent = data.eligible ? "Ready" : "Used";
          if (updateResult) {
            spinResult.classList.remove("win");
            spinResult.textContent = data.eligible ? "Your daily spin is ready." : spinWait(data.nextSpinAt);
          }
          spinRunButtons.forEach((button) => {
            button.disabled = !data.eligible;
            button.textContent = data.eligible ? "Daily Spin" : "Spin Used";
          });
        }

        async function runDailySpin() {
          if (!currentPlayer) return showLogin();
          spinRunButtons.forEach((button) => { button.disabled = true; });
          spinResult.classList.remove("win");
          spinResult.textContent = "Spinning...";
          spinWheel.style.transform = `rotate(${720 + Math.floor(Math.random() * 360)}deg)`;
          try {
            const data = await api("/api/player/spin", { method: "POST", body: JSON.stringify({}) });
            currentPlayer = data.user;
            playerPoints.textContent = fmt(data.user?.points);
            spinState.textContent = "Complete";
            spinResult.classList.toggle("win", Number(data.prize) > 0);
            spinResult.textContent = Number(data.prize) > 0
              ? `You won ${data.prize} point${Number(data.prize) === 1 ? "" : "s"}.`
              : "No win this time. Come back tomorrow.";
          } catch (error) {
            spinResult.textContent = `${error.message || "Daily spin failed."} ${spinWait(error.nextSpinAt)}`.trim();
          } finally {
            refreshSpinStatus({ updateResult: false }).catch(() => {});
          }
        }

        document.querySelector("[data-player-login]").addEventListener("submit", async (event) => {
          event.preventDefault();
          setStatus("Checking login...");
          const form = event.currentTarget;
          try {
            const data = await api("/api/player/login", {
              method: "POST",
              body: JSON.stringify({
                email: form.elements.email.value.trim(),
                password: form.elements.password.value,
              }),
            });
            form.reset();
            window.location.href = "/slots-arcade.html";
          } catch (error) {
            setStatus(error.message || "Could not log in.");
          }
        });

        document.querySelectorAll("[data-chat-open]").forEach((button) => button.addEventListener("click", openChat));
        document.querySelector("[data-chat-close]").addEventListener("click", () => chatPanel.classList.add("hidden"));
        document.querySelector("[data-menu-toggle]").addEventListener("click", () => {
          playerMenu.classList.toggle("hidden");
        });
        spinRunButtons.forEach((button) => button.addEventListener("click", runDailySpin));
        document.querySelector("[data-home-brand]").addEventListener("click", (event) => {
          if (!currentPlayer) return;
          event.preventDefault();
          showHome(currentPlayer);
        });

        document.querySelector("[data-logout]").addEventListener("click", async () => {
          await api("/api/player/logout", { method: "POST" }).catch(() => {});
          playerMenu.classList.add("hidden");
          showLogin();
        });

        passwordForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          if (!currentPlayer) return showLogin();
          const button = passwordForm.querySelector("button[type='submit']");
          button.disabled = true;
          setStatus("Updating password...");
          try {
            await api("/api/player/change-password", {
              method: "POST",
              body: JSON.stringify({
                currentPassword: passwordForm.elements.currentPassword.value,
                newPassword: passwordForm.elements.newPassword.value,
              }),
            });
            passwordForm.reset();
            setStatus("Password updated.", true);
          } catch (error) {
            setStatus(error.message || "Could not update password.");
          } finally {
            button.disabled = false;
          }
        });

        nameForm.addEventListener("submit", (event) => {
          event.preventDefault();
          const input = nameForm.elements.namedItem("name");
          const name = input?.value.trim() || "";
          if (!name) {
            nameStatus.textContent = "Please enter your name first.";
            input?.focus();
            return;
          }
          setName(name);
          nameStatus.textContent = "";
          updateChatState();
          renderMessages([]);
          chatForm.elements.message.focus();
        });

        chatForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          if (!currentPlayer && !savedName()) return updateChatState();
          const input = chatForm.elements.message;
          const text = input.value.trim();
          if (!text) return;
          input.value = "";
          try {
            const endpoint = currentPlayer ? "/api/chats/player-message" : "/api/chats/guest-message";
            const body = currentPlayer ? { text } : { name: savedName(), text };
            const data = await api(endpoint, { method: "POST", body: JSON.stringify(body) });
            renderMessages(data.chat?.messages || []);
          } catch (error) {
            renderMessages([{ author: "operator", text: error.message || "Could not send message." }]);
          }
        });

        api("/api/player/me")
          .then(() => { window.location.href = "/slots-arcade.html"; })
          .catch(() => showLogin());
      })();
    </script>
  </body>
</html>
