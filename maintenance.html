<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Diamond Maintenance</title>
    <meta name="theme-color" content="#f6c85f" />
    <style>
      :root {
        color-scheme: dark;
        --gold: #f6c85f;
        --cream: #fff7df;
        --muted: #c9b98d;
        --night: #070707;
        --panel: #17120b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 28px;
        color: var(--cream);
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at 24% 20%, rgba(246, 200, 95, 0.18), transparent 32%),
          linear-gradient(135deg, rgba(70, 8, 14, 0.55), transparent 44%),
          var(--night);
      }

      main {
        width: min(720px, 100%);
        padding: clamp(28px, 6vw, 58px);
        border: 1px solid rgba(246, 200, 95, 0.34);
        border-radius: 10px;
        background: linear-gradient(135deg, rgba(246, 200, 95, 0.1), rgba(255, 255, 255, 0.03)), var(--panel);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.44);
        text-align: center;
      }

      .mark {
        width: 78px;
        height: 78px;
        display: grid;
        place-items: center;
        margin: 0 auto 22px;
        color: #120d05;
        background: linear-gradient(135deg, #fff2a8, var(--gold));
        font-weight: 900;
        border-radius: 18px;
        rotate: 45deg;
      }

      .mark span {
        rotate: -45deg;
      }

      p:first-of-type {
        margin: 0 0 12px;
        color: var(--gold);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 0.95;
        text-transform: uppercase;
      }

      p:last-of-type {
        max-width: 520px;
        margin: 22px auto 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark"><span>SD</span></div>
      <p>South Diamond</p>
      <h1>Under Maintenance</h1>
      <p>We are updating the lobby right now. Please check back shortly.</p>
    </main>
  </body>
</html>
